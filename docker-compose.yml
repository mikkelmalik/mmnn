# Book Club — VPS deployment (app + Postgres + Caddy for automatic HTTPS).
#
#   1. cp .env.example .env    and fill in the values (incl. ADMIN_EMAIL/PASSWORD)
#   2. docker compose up -d --build
#
# On start the app applies migrations and seeds the admin owner automatically
# from ADMIN_EMAIL/ADMIN_PASSWORD — sign in at https://$DOMAIN/login, then share
# a sign-up link from the Group tab to invite others.
#
# Caddy obtains and renews a Let's Encrypt certificate for $DOMAIN automatically,
# so point your domain's A record at the server first.

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-bookclub}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bookclub} -d ${POSTGRES_DB:-bookclub}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-bookclub}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-bookclub}"
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      AUTH_URL: ${AUTH_URL:?set AUTH_URL in .env}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Book Club <no-reply@bookclub.local>}
      # Initial admin (group owner). Created on first start; can invite others.
      ADMIN_EMAIL: ${ADMIN_EMAIL:?set ADMIN_EMAIL in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      SEED_GROUP_NAME: ${SEED_GROUP_NAME:-The Book Club}
      SEED_MEMBER_EMAILS: ${SEED_MEMBER_EMAILS:-}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
