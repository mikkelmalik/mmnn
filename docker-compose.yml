# Book Club — one Docker Compose file for every service, dev AND production.
#
# The whole app runs in containers; a clean Ubuntu/Debian box with only Docker
# installed can run it. Pick the mode with COMPOSE_PROFILES in .env:
#
#   COMPOSE_PROFILES=dev          → db + app (hot reload) on http://localhost:3000
#   COMPOSE_PROFILES=prod         → db + app (built image) on http://localhost:3000
#   COMPOSE_PROFILES=prod,proxy   → db + app + Caddy (automatic HTTPS for $DOMAIN)
#
# Then, always:
#
#   1. cp .env.example .env    and fill in the values (incl. ADMIN_EMAIL/PASSWORD)
#   2. docker compose up -d --build
#
# On start the app applies migrations and seeds the admin owner automatically
# from ADMIN_EMAIL/ADMIN_PASSWORD — sign in at /login, then share a sign-up link
# from the Group tab to invite others.
#
# With the `proxy` profile, Caddy obtains and renews a Let's Encrypt certificate
# for $DOMAIN automatically, so point your domain's A record at the server first.

# Environment shared by the dev and prod app containers. DATABASE_URL is derived
# from POSTGRES_* and points at the internal `db` service — you never set it by hand.
x-app-env: &app_env
  DATABASE_URL: "postgres://${POSTGRES_USER:-bookclub}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-bookclub}"
  AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
  AUTH_URL: ${AUTH_URL:?set AUTH_URL in .env}
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  EMAIL_FROM: ${EMAIL_FROM:-Book Club <no-reply@bookclub.local>}
  # Initial admin (group owner). Created on first start; can invite others.
  ADMIN_EMAIL: ${ADMIN_EMAIL:?set ADMIN_EMAIL in .env}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
  ADMIN_NAME: ${ADMIN_NAME:-Admin}
  SEED_GROUP_NAME: ${SEED_GROUP_NAME:-The Book Club}
  SEED_MEMBER_EMAILS: ${SEED_MEMBER_EMAILS:-}

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-bookclub}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Bound to localhost only so host-side tooling can reach it without ever
    # exposing Postgres to the internet (matters for hosted production).
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bookclub} -d ${POSTGRES_DB:-bookclub}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  # Production app — built image, `next start`. (COMPOSE_PROFILES=prod)
  app:
    profiles: [prod]
    build:
      context: .
      target: prod
    restart: unless-stopped
    environment: *app_env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"

  # Development app — hot reload, source bind-mounted. (COMPOSE_PROFILES=dev)
  app-dev:
    profiles: [dev]
    build:
      context: .
      target: dev
    restart: unless-stopped
    environment:
      <<: *app_env
      NODE_ENV: development
      # Reliable file-watching for hot reload across a bind mount.
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      # Live source for hot reload, with container-owned node_modules/.next
      # (named volumes seeded from the image) so the host needs no `npm install`.
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"

  # Reverse proxy with automatic HTTPS — hosted production only.
  # Use together with the prod profile: COMPOSE_PROFILES=prod,proxy
  caddy:
    profiles: [proxy]
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Only read by this (proxy-profile) service. Kept as a soft default rather
      # than a required `:?` guard because Compose interpolates the whole file at
      # load time — a hard-require here would fail `dev`, where caddy never runs.
      DOMAIN: ${DOMAIN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  node_modules:
  next_cache:
  caddy_data:
  caddy_config:
