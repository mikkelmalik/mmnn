# Local Postgres for `npm run dev` (the app itself runs on the host, not in
# Docker, here — see docker-compose.yml for the full containerized deploy).
#
#   docker compose -f docker-compose.dev.yml up -d

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookclub
      POSTGRES_PASSWORD: bookclub
      POSTGRES_DB: bookclub
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data

volumes:
  pgdata_dev:
